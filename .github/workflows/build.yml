name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  SOLUTION_FILE_PATH: recap_parser.sln
  BUILD_TYPE: Release

jobs:
  get-info:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
      date: ${{ steps.vars.outputs.date }}
      shorthash: ${{ steps.vars.outputs.shorthash }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Extract version
      id: extract_version
      run: |
        echo "version=1.0.0" >> $GITHUB_OUTPUT
        # Alternative if you have a version extraction script:
        # echo "version=$(./scripts/extract_version.sh)" >> $GITHUB_OUTPUT
    - name: Get date and git hash
      id: vars
      run: |
        echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        echo "shorthash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  build-windows:
    needs: get-info
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64]
        configuration: [Debug, Release]
    steps:
    - uses: actions/checkout@v4
    
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.3.1
      
    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}
      
    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} ${{env.SOLUTION_FILE_PATH}}
      
    - name: Prepare output directory
      run: |
        mkdir -p bin_output
        
    - name: Copy build artifacts
      run: |
        Copy-Item -Path "${{ matrix.platform }}\${{ matrix.configuration }}\recap_parser.exe" -Destination "bin_output\recap_parser.exe"
        Copy-Item -Path "res\*" -Destination "bin_output\" -Include "*.ico", "*.png" -ErrorAction SilentlyContinue
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: recap_parser-${{ needs.get-info.outputs.version }}-win-${{ matrix.platform }}-${{ matrix.configuration }}
        path: bin_output/*

  build-ubuntu:
    needs: get-info
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make cmake
        
    - name: Setup CMake
      run: |
        mkdir -p build
        cd build
        cat > CMakeLists.txt << EOF
        cmake_minimum_required(VERSION 3.10)
        project(recap_parser)
        set(CMAKE_CXX_STANDARD 20)
        add_executable(recap_parser ../main.cpp ../catalog.cpp)
        EOF
        
    - name: Build
      run: |
        cd build
        cmake .
        make
        
    - name: Prepare output directory
      run: |
        mkdir -p bin_output
        cp build/recap_parser bin_output/
        cp -r res/* bin_output/ || true
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: recap_parser-${{ needs.get-info.outputs.version }}-linux-x64
        path: bin_output/*

  create-release:
    needs: [get-info, build-windows, build-ubuntu]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Prepare release assets
      run: |
        cd artifacts
        for dir in */; do
          (cd "$dir" && zip -r "../${dir%/}.zip" .)
        done
        
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.get-info.outputs.version }}
        release_name: Recap Parser v${{ needs.get-info.outputs.version }}
        draft: false
        prerelease: false
        body: |
          Release of Recap Parser v${{ needs.get-info.outputs.version }}
          
          Date: ${{ needs.get-info.outputs.date }}
          Commit: ${{ needs.get-info.outputs.shorthash }}
          
    - name: Upload Release Assets
      run: |
        for file in artifacts/*.zip; do
          filename=$(basename "$file")
          echo "Uploading $filename..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @"$file" \
            "${{ steps.create_release.outputs.upload_url }}?name=$filename"
        done